<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>期权异常流识别器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        :root {
            --primary: #06b6d4;
            --primary-dark: #0891b2;
            --secondary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --card-bg: #1e293b;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: max(12px, env(safe-area-inset-top));
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            padding-left: max(12px, env(safe-area-inset-left));
            padding-right: max(12px, env(safe-area-inset-right));
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 12px;
        }

        /* Header */
        .header {
            flex-shrink: 0;
            padding: 12px 16px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-text {
            flex: 1;
            min-width: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #67e8f9, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-status {
            font-size: 11px;
            color: #94a3b8;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-indicator.online {
            background: #10b981;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.offline {
            background: #ef4444;
        }

        .status-indicator.scanning {
            background: #3b82f6;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Controls */
        .controls {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            active:scale(0.95);
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-scan {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 16px rgba(6, 182, 212, 0.3);
        }

        .btn-scan:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-scan:disabled {
            opacity: 0.6;
        }

        .btn-secondary {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .btn-secondary:active {
            background: rgba(59, 130, 246, 0.3);
        }

        /* Stats */
        .stats {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-value.excellent {
            color: var(--success);
        }

        .stat-value.good {
            color: var(--secondary);
        }

        .stat-value.total {
            color: #94a3b8;
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            line-height: 1.2;
        }

        /* Results Container */
        .results-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .results-container::-webkit-scrollbar {
            width: 4px;
        }

        .results-container::-webkit-scrollbar-track {
            background: rgba(6, 182, 212, 0.1);
            border-radius: 2px;
        }

        .results-container::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.3);
            border-radius: 2px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            text-align: center;
            color: #64748b;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .empty-hint {
            font-size: 12px;
            color: #475569;
        }

        /* Result Card */
        .result-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card:active {
            border-color: rgba(6, 182, 212, 0.5);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
        }

        .result-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }

        .result-symbol {
            font-size: 20px;
            font-weight: 700;
            color: white;
            flex: 1;
        }

        .result-score {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 60px;
            text-align: right;
        }

        .result-price {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .result-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-excellent {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .status-good {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .status-fair {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .status-poor {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .result-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 11px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
        }

        .metric-value {
            color: #e2e8f0;
            font-weight: 600;
        }

        .conditions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            font-size: 11px;
        }

        .condition {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .condition-check {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            flex-shrink: 0;
        }

        .condition-check.yes {
            background: var(--success);
            color: white;
        }

        .condition-check.no {
            background: #475569;
            color: #64748b;
        }

        .condition-text {
            color: #94a3b8;
        }

        /* Connection Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            padding: 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #67e8f9;
            margin-bottom: 12px;
        }

        .modal-text {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            margin-bottom: 12px;
            -webkit-appearance: none;
            appearance: none;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-modal {
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-modal.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-modal.secondary {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (orientation: landscape) {
            .app-container {
                gap: 8px;
            }

            .header {
                padding: 8px 12px;
            }

            .header-title {
                font-size: 16px;
            }

            .controls {
                gap: 6px;
            }

            button {
                padding: 8px 12px;
                font-size: 12px;
            }

            .stats {
                gap: 6px;
            }

            .stat-card {
                padding: 8px;
            }

            .stat-value {
                font-size: 24px;
            }

            .stat-label {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-icon">🚀</div>
                <div class="header-text">
                    <div class="header-title">期权异常流识别器</div>
                    <div class="header-status">
                        <span class="status-indicator offline" id="statusIndicator"></span>
                        <span id="statusText">连接中...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-scan" id="scanBtn" onclick="startScan()">
                🔍 开始扫描
            </button>
            <button class="btn-secondary" onclick="showConnectionModal()">
                ⚙️ 设置
            </button>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value excellent" id="excellentCount">0</div>
                <div class="stat-label">优秀</div>
            </div>
            <div class="stat-card">
                <div class="stat-value good" id="goodCount">0</div>
                <div class="stat-label">良好</div>
            </div>
            <div class="stat-card">
                <div class="stat-value total" id="totalCount">0</div>
                <div class="stat-label">总数</div>
            </div>
        </div>

        <!-- Results -->
        <div class="results-container" id="resultsContainer">
            <div class="empty-state">
                <div class="empty-icon">📡</div>
                <div class="empty-text">点击「开始扫描」获取数据</div>
                <div class="empty-hint">需要后端服务和WiFi连接</div>
            </div>
        </div>
    </div>

    <!-- Connection Modal -->
    <div class="modal" id="connectionModal">
        <div class="modal-content">
            <div class="modal-title">⚙️ 连接设置</div>
            <div class="modal-text">
                输入后端服务地址<br>
                <span style="font-size: 11px; color: #475569;">例如: 192.168.1.100:5000</span>
            </div>
            <input type="text" id="serverInput" class="modal-input" placeholder="IP:端口" value="">
            <div class="modal-buttons">
                <button class="btn-modal secondary" onclick="closeConnectionModal()">取消</button>
                <button class="btn-modal primary" onclick="saveConnection()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let API_URL = localStorage.getItem('API_URL') || 'http://localhost:5000';
        let isScanning = false;
        let pollInterval = null;

        // 页面加载时尝试自动连接
        window.addEventListener('load', () => {
            checkConnection();
            // 也尝试连接本地
            tryAutoConnect();
        });

        async function tryAutoConnect() {
            // 尝试常见的本地IP
            const possibleIPs = [
                'http://localhost:5000',
                'http://127.0.0.1:5000',
                'http://192.168.1.1:5000',
                'http://192.168.0.1:5000'
            ];

            for (let ip of possibleIPs) {
                try {
                    const response = await fetch(`${ip}/health`, { 
                        timeout: 1000,
                        headers: { 'X-Test': 'true' }
                    });
                    if (response.ok) {
                        API_URL = ip;
                        localStorage.setItem('API_URL', API_URL);
                        await checkConnection();
                        return;
                    }
                } catch (e) {
                    // 继续尝试下一个
                }
            }
        }

        async function checkConnection() {
            try {
                const response = await fetch(`${API_URL}/health`, { timeout: 3000 });
                if (response.ok) {
                    updateConnectionStatus(true);
                    return true;
                }
            } catch (e) {
                console.log('Connection failed:', e);
            }
            updateConnectionStatus(false);
            return false;
        }

        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const scanBtn = document.getElementById('scanBtn');

            if (connected) {
                indicator.className = 'status-indicator online';
                statusText.textContent = '已连接';
                scanBtn.disabled = false;
            } else {
                indicator.className = 'status-indicator offline';
                statusText.textContent = '未连接';
                scanBtn.disabled = true;
            }
        }

        function showConnectionModal() {
            document.getElementById('serverInput').value = API_URL.replace('http://', '');
            document.getElementById('connectionModal').classList.add('show');
        }

        function closeConnectionModal() {
            document.getElementById('connectionModal').classList.remove('show');
        }

        function saveConnection() {
            const input = document.getElementById('serverInput').value.trim();
            if (!input) {
                alert('请输入服务器地址');
                return;
            }

            API_URL = input.includes('http') ? input : `http://${input}`;
            localStorage.setItem('API_URL', API_URL);
            closeConnectionModal();
            checkConnection();
        }

        async function startScan() {
            const connected = await checkConnection();
            if (!connected) {
                alert('服务器未连接。请检查:\n1. 后端服务是否运行\n2. 是否在同一WiFi');
                return;
            }

            document.getElementById('scanBtn').disabled = true;
            const statusIndicator = document.getElementById('statusIndicator');
            statusIndicator.className = 'status-indicator scanning';

            try {
                const response = await fetch(`${API_URL}/api/scan`, {
                    method: 'POST'
                });

                if (!response.ok) throw new Error('Failed to start scan');

                // 开始轮询
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(pollResults, 2000);

                // 立即检查一次
                await pollResults();
            } catch (e) {
                alert('扫描失败: ' + e.message);
                document.getElementById('scanBtn').disabled = false;
                statusIndicator.className = 'status-indicator offline';
            }
        }

        async function pollResults() {
            try {
                const response = await fetch(`${API_URL}/api/results`);
                const data = await response.json();

                renderResults(data.results);
                updateStats(data);

                if (!data.is_scanning) {
                    clearInterval(pollInterval);
                    document.getElementById('scanBtn').disabled = false;
                    document.getElementById('statusIndicator').className = 'status-indicator online';
                }
            } catch (e) {
                console.error('Poll failed:', e);
            }
        }

        function renderResults(results) {
            const container = document.getElementById('resultsContainer');

            if (!results || results.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-text">暂无结果</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = results.map(result => `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-symbol">${result.symbol}</div>
                        <div class="result-score">${result.score}</div>
                    </div>

                    <div class="result-price">
                        ¥${result.data.current_price.toFixed(2)} | Vol/OI: ${result.data.vol_oi_ratio.toFixed(2)}
                    </div>

                    <div class="result-status status-${result.status}">
                        ${getStatusLabel(result.status)}
                    </div>

                    <div class="result-metrics">
                        <div class="metric"><span>成交</span><span class="metric-value">${result.data.total_volume}</span></div>
                        <div class="metric"><span>持仓</span><span class="metric-value">${result.data.total_oi}</span></div>
                        <div class="metric"><span>隐波</span><span class="metric-value">${(result.data.avg_iv * 100).toFixed(1)}%</span></div>
                        <div class="metric"><span>次数</span><span class="metric-value">${result.data.consecutive}</span></div>
                    </div>

                    <div class="conditions-grid">
                        <div class="condition">
                            <div class="condition-check ${result.conditions.volumeOI ? 'yes' : 'no'}">✓</div>
                            <span class="condition-text">Vol>>OI</span>
                        </div>
                        <div class="condition">
                            <div class="condition-check ${result.conditions.askSide ? 'yes' : 'no'}">✓</div>
                            <span class="condition-text">Ask-side</span>
                        </div>
                        <div class="condition">
                            <div class="condition-check ${result.conditions.sweep ? 'yes' : 'no'}">✓</div>
                            <span class="condition-text">Sweep</span>
                        </div>
                        <div class="condition">
                            <div class="condition-check ${result.conditions.otm ? 'yes' : 'no'}">✓</div>
                            <span class="condition-text">OTM</span>
                        </div>
                        <div class="condition">
                            <div class="condition-check ${result.conditions.ivSync ? 'yes' : 'no'}">✓</div>
                            <span class="condition-text">IV同步</span>
                        </div>
                        <div class="condition">
                            <div class="condition-check ${result.conditions.priceStill ? 'yes' : 'no'}">✓</div>
                            <span class="condition-text">股价未动</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getStatusLabel(status) {
            const labels = {
                'excellent': '优秀',
                'good': '良好',
                'fair': '一般',
                'poor': '弱'
            };
            return labels[status] || status;
        }

        function updateStats(data) {
            document.getElementById('excellentCount').textContent = data.excellent || 0;
            document.getElementById('goodCount').textContent = data.good || 0;
            document.getElementById('totalCount').textContent = data.total || 0;
        }

        // 每30秒检查一次连接
        setInterval(checkConnection, 30000);

        // 禁用长按菜单
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
